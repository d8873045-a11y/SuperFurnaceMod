name: Build Minecraft Mod

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Overwrite build.gradle with fixed version
      run: |
        cat << 'EOF' > build.gradle
        buildscript {
            repositories {
                maven { url = "https://maven.minecraftforge.net/" }
                maven { url = "https://plugins.gradle.org/m2/" }
                mavenCentral()
            }
            dependencies {
                classpath 'net.minecraftforge.gradle:ForgeGradle:2.3-SNAPSHOT'
            }
        }
        apply plugin: 'net.minecraftforge.gradle'

        version = "1.0.0"
        group = "com.d8873045a11y.superfurnacemod"
        archivesBaseName = "superfurnacemod"

        sourceCompatibility = targetCompatibility = '1.8'
        compileJava {
            sourceCompatibility = targetCompatibility = '1.8'
        }

        minecraft {
            version = "1.12.2-14.23.5.2859"
            runDir = "run"
            mappings = "snapshot_20171003"
        }

        repositories {
            maven { url = "https://maven.minecraftforge.net/" }
            mavenCentral()
        }

        dependencies {
        }

        processResources {
            inputs.property "version", project.version
            inputs.property "mcversion", project.minecraft.version

            from(sourceSets.main.resources.srcDirs) {
                include 'mcmod.info'
                expand 'version':project.version, 'mcversion':project.minecraft.version
            }
                
            from(sourceSets.main.resources.srcDirs) {
                exclude 'mcmod.info'
            }
        }
        EOF

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 4.10.3

    - name: Setup Minecraft Workspace
      run: gradle setupDecompWorkspace

    - name: Build Mod
      run: gradle build

    - name: Upload Mod Artifact
      uses: actions/upload-artifact@v4
      with:
        name: superfurnacemod-jar
        path: build/libs/*.jar
        
