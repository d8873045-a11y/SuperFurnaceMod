name: Build SuperFurnaceMod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build (Forge 1.12.2 / Java 8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle and ForgeGradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', 'gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Forge workspace
        run: ./gradlew setupCIWorkspace --no-daemon --stacktrace
        env:
          JAVA_OPTS: "-Xmx3G"

      - name: Build mod JAR
        run: ./gradlew build --no-daemon --stacktrace
        env:
          JAVA_OPTS: "-Xmx3G"

      - name: Upload mod artifact
        uses: actions/upload-artifact@v4
        with:
          name: superfurnacemod-${{ github.sha }}
          path: build/libs/superfurnacemod-*.jar
          if-no-files-found: error
          
