name: Build Minecraft Mod

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Install Gradle 7.5 (required for ForgeGradle 3)
      run: |
        wget -q https://services.gradle.org/distributions/gradle-7.5-bin.zip
        unzip -q gradle-7.5-bin.zip

    - name: Overwrite build.gradle with fixed version
      run: |
        cat << 'EOF' > build.gradle
        buildscript {
            repositories {
                maven { url = "https://maven.minecraftforge.net/" }
                maven { url = "https://plugins.gradle.org/m2/" }
                mavenCentral()
            }
            dependencies {
                classpath group: 'net.minecraftforge.gradle', name: 'ForgeGradle', version: '3.+', changing: true
            }
        }
        apply plugin: 'net.minecraftforge.gradle'

        version = "1.0.0"
        group = "com.d8873045a11y.superfurnacemod"
        archivesBaseName = "superfurnacemod"

        sourceCompatibility = targetCompatibility = '1.8'
        compileJava {
            sourceCompatibility = targetCompatibility = '1.8'
        }

        ext.mcVersion = '1.12.2'
        ext.forgeVersion = '14.23.5.2859'

        minecraft {
            mappings channel: 'snapshot', version: '20171003-1.12'
        }

        repositories {
            maven { url = "https://maven.minecraftforge.net/" }
            mavenCentral()
        }

        dependencies {
            minecraft "net.minecraftforge:forge:${mcVersion}-${forgeVersion}"
        }

        processResources {
            inputs.property "version", project.version
            inputs.property "mcversion", mcVersion

            from(sourceSets.main.resources.srcDirs) {
                include 'mcmod.info'
                expand 'version':project.version, 'mcversion':mcVersion
            }

            from(sourceSets.main.resources.srcDirs) {
                exclude 'mcmod.info'
            }
        }
        EOF

    - name: Build Mod
      run: ./gradle-7.5/bin/gradle build

    - name: Upload Mod Artifact
      uses: actions/upload-artifact@v4
      with:
        name: superfurnacemod-jar
        path: build/libs/*.jar
